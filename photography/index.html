<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funmi Looi-Somoye ~ Photography Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* --- Global Styles --- */
    body {
      margin: 0;
      background-color: #fdfdfd;
      font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
      color: #111;
      letter-spacing: 0.5px;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Header --- */
    header {
      text-align: center;
      padding: 4rem 1rem 2rem;
      border-bottom: 1px solid #eaeaea;
    }

    header h1 {
      font-weight: 600;
      letter-spacing: 4px;
      font-size: 2rem;
      margin: 0;
    }

    header h2 {
      color: #444;
      margin: 0.6rem 0 0;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* --- Section Styling --- */
    section {
      padding: 80px 10%;
      text-align: center;
    }

    h2 {
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }

    p {
      max-width: 720px;
      margin: 0.5rem auto 2rem;
      color: #555;
      line-height: 1.7;
      font-weight: 300;
    }

    /* --- Feature Section --- */
    .feature img {
      max-width: 700px;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
      transition: transform 0.4s ease;
    }

    .feature img:hover {
      transform: scale(1.02);
    }

    /* --- Video/GIF Section --- */
    .video-section {
      background-color: #fafafa;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    .video-section .video-player {
      width: 100%;
      max-width: 320px; 
      height: auto;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .video-section .video-player:hover {
      transform: scale(1.04);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    /* --- Film Sections --- */
    .film-gallery {
      display: grid;
      gap: 15px;
      margin-top: 2rem;
    }

    /* Portrait Grid (5 items) */
    .grid-portrait {
      grid-template-columns: repeat(5, 1fr);
      margin-bottom: 30px;
    }

    /* Landscape Grid (3 items) */
    .grid-landscape {
      grid-template-columns: repeat(3, 1fr);
      max-width: 1000px; /* Kept slightly narrower for focus */
      margin-left: auto;
      margin-right: auto;
    }

    .film-gallery img {
      width: 100%;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .grid-portrait img { aspect-ratio: 2 / 3; }
    .grid-landscape img { aspect-ratio: 3 / 2; }

    .film-gallery img:hover {
      transform: scale(1.04);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
